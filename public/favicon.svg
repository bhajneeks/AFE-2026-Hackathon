<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Orbit favicon: planet + orbital ring + satellite, derived from the brand
       palette (Amazon orange on deep navy) rather than the wordmark logo. -->
  <!-- planet -->
  <circle cx="32" cy="32" r="17" fill="#ff9900"/>
  <circle cx="32" cy="32" r="17" fill="url(#shade)"/>
  <!-- orbital ring (ellipse, tilted) -->
  <g transform="rotate(-24 32 32)">
    <ellipse cx="32" cy="32" rx="28" ry="10.5" fill="none" stroke="#121a2e" stroke-width="4.5" opacity=".92"/>
    <ellipse cx="32" cy="32" rx="28" ry="10.5" fill="none" stroke="#ffffff" stroke-width="1.6" opacity=".9"/>
    <!-- satellite -->
    <circle cx="60" cy="32" r="5" fill="#ffffff"/>
    <circle cx="60" cy="32" r="3.2" fill="#ff9900"/>
  </g>
  <defs>
    <radialGradient id="shade" cx="0.35" cy="0.3" r="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".35"/>
      <stop offset=".45" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#7a3d00" stop-opacity=".45"/>
    </radialGradient>
  </defs>
</svg>
